<!DOCTYPE html>
<html>
    <head>
        <title>Display FLEX</title>
        <meta charset="utf-8">
        <style>
            header{
                text-align: center;
                font-size: 25px;
                text-decoration: underline;
            }
            .titol{
                text-align: center;
            }
            .caixa{
                border: 2px solid black;
                margin: 2px;
                width: 150px;
            }
            .tarjeta{
                height: 100px;
                width: 150px;
                display: flex;
            }
            .caixaPETITA{
                border: 1px solid black;
                border-style: dashed;
                margin: 2px;
                width: 25px;
                height: 20px;
                text-align: center;
            }
            
            /* colors pastis propis */
            .verd{      background-color: lightgreen;}
            .vermell{   background-color: lightcoral;}
            .blau{      background-color: lightskyblue;}
            .groc{      background-color: lightgoldenrodyellow;}

        </style>

    </head>
    <body>
        <header><b>Exemple de visualització display flex</b></header>

        <div>
            Flex direction
            <div style="display: flex;">

                <div class="titol caixa" s>
                    Row
                        <div class="tarjeta" style="flex-direction: row;">
                            <div class="caixaPETITA verd">01</div>
                            <div class="caixaPETITA vermell">02</div>
                            <div class="caixaPETITA blau">03</div>
                            <div class="caixaPETITA groc">04</div>
                        </div>
                </div>

                <div class="titol caixa">
                    Row reverse
                        <div class="tarjeta" style="flex-direction: row-reverse;">
                            <div class="caixaPETITA verd">01</div>
                            <div class="caixaPETITA vermell">02</div>
                            <div class="caixaPETITA blau">03</div>
                            <div class="caixaPETITA groc">04</div>
                        </div>
                </div>
                
                <div class="titol caixa">
                    Column
                        <div class="tarjeta" style="flex-direction: column;">
                            <div class="caixaPETITA verd">01</div>
                            <div class="caixaPETITA vermell">02</div>
                            <div class="caixaPETITA blau">03</div>
                            <div class="caixaPETITA groc">04</div>
                        </div>
                </div>
                
                <div class="titol caixa">
                    Column reverse
                        <div class="tarjeta" style="flex-direction: column-reverse;">
                            <div class="caixaPETITA verd">01</div>
                            <div class="caixaPETITA vermell">02</div>
                            <div class="caixaPETITA blau">03</div>
                            <div class="caixaPETITA groc">04</div>
                        </div>
                </div>

            </div>

        </div>

    </body>
</html>
