<!DOCTYPE html>
<html lang="ca">
    <head>
        <title>Exemple d'us del GRID</title>
        <meta charset="utf-8">
        <style>
            /* clases d'estils */
            .contenidor{
                display: grid;
                grid-template-areas: 
                "header header header header header header header header"           /* primera fila */
                "aside aside aside aside aside aside aside aside "
                "menu main main main main main main main"
                "menu main main main main main main main"
                "menu main main main main main main main"
                "footer footer footer footer footer footer footer footer ";
                
                /* aixo determina quines proporcions ocupan les files i columnes  */
                grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
                grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr;
            }
            
            /* clases d'etiquetes */
            header,footer{
                text-align: center;
                background-color: rgb(7, 7, 124);
                color: azure;
            }
            /* en aquestes etiquetes asociem la files i columnes */
            header{
                grid-area: header;
            }
            aside{
                grid-area: aside;
                background-color: blueviolet;
            }
            .menu{
                grid-area: menu;
                background-color: blueviolet;
            }
            main{
                grid-area: main;
                background-color: chartreuse;
            }
            footer{
                grid-area: footer;
                background-color: crimson;
            }
        </style>
    </head>
    <body class="contenidor">
        <!-- Capçalera -->
        <header>
            <h1> Exemple d'ús del display GRID</h1>
        </header>

        <!-- Menu -->
        <aside>
            opcions de menu
        </aside>
        <div class="menu">
            menu lateral
        </div>
        
        <!-- Contingut -->
        <main>
            MAIN
        </main>
        
        <!-- Peu de pàgina -->
        <footer>
            <h6>Desenvolupat per Osc1977</h6>
        </footer>

    </body>
</html>
