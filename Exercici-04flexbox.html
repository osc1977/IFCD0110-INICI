<!DOCTYPE html>
<html>
    <head>
        <title>css flex</title>
        <meta charset="utf-8">
        <style>
            header, footer{
                text-align: center;
                background-color: black;
                color: white;
            }
            header{margin-bottom: 2px;}
            main{
                height: 500px;
                display: flex;
                /* flex-direction: column-reverse; */
                /* flex-wrap: wrap-reverse; */
                /* justify-content: space-between; */
                align-items: baseline;
            }
            header{
                font-size: 30pt;
            }
            .caixa{
                height: 150px;
                width: 150px;
                text-align: center;
                border: 2px solid black;
                margin: 4px;
                padding: 4px;                
            }
            .verd{
                background-color: rgb(98, 240, 98);
                height: 300px;
            }
            .vermell{
                background-color: rgb(230, 98, 98);
                height: 20px;
            }
            .blau{
                background-color: rgb(104, 185, 235);
                height: 75px;
            }
            .groc{
                background-color: rgb(231, 216, 76);
            }
        </style>
    </head>


    <body>
        <header>Exemple de display FLEX</header>

        <main>
            <div class="caixa verd" style="order: 2;">Caixa1</div>
            <div class="caixa vermell" style="order: 4;">Caixa2</div>
            <div class="caixa blau" style="order: 1;">Caixa3</div>
            <div class="caixa groc" style="order: 2;">Caixa4</div>
        </main>

        <footer>
            <h6>Desenvolupat per Osc1977</h6>
        </footer>

    </body>
</html>
