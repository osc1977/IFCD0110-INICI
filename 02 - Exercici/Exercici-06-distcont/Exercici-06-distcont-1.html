<!DOCTYPE html>
<html>
    <head>
        <title>Distribucio contingut</title>
        <meta charset="utf-8">
        <style>
            header, footer{
                text-align: center;
                width: 792px;
                background-color: lightsteelblue;
                position: relative;
            }
            nav, main, aside{
                position: absolute;
                height: 500px;
                text-align: center;
            }
            article{
                height: 150px;
                width: 250px;
                border: 2px solid black;
                margin: 4px;
                padding: 4px;
                text-align: left;                
            }


            .ord{
                display: flex;
                flex-direction: row;
            }
            .cxCap{
                background-color: rgb(243, 122, 122);
            }
            .cxPeu{
                position: absolute;
                top: 40px;
                background-color: rgb(243, 122, 122);
            }
            .cxMen{
                width: 100px;
                background-color: rgb(243, 122, 122);
            }
            .cxPrin{
                width: 600px;
                background-color: rgb(112, 158, 226);
                left: 100px;
            }
            .cxAsi{
                width: 100px;
                background-color: rgb(112, 226, 141);
                left: 700px;
            }
        </style>
    </head>
    <body>
        <!-- Capçalera -->
        <header style="height: 40px;">
            <h1>Utilizant caixes semàntiques</h1>
        </header>
        
        <nav class="cxMen">
            <h3>Menu</h3>
        </nav>
        
        <main class="cxPrin">
            <h3>Contingut principal</h3>
            <div class="ord" style="text-align: center; justify-content: center;">
                <section>
                    Sección primera
                    <article style="background-color: lightblue;">
                        Article de contigut num-1
                    </article>
                    <article style="background-color: lightblue;">
                        Article de contigut num-2
                    </article>
                </section>
                
                <section>
                    Sección segona
                    <article style="background-color: lightblue;">
                        Article de contigut num-3
                    </article>
                    <article style="background-color: lightblue;">
                        Article de contigut num-4
                    </article>
                </section>
            </div>
        </main>

        <aside class="cxAsi">
            <h3>Aside</h3>
        </aside>
        
        <!-- Peu de pàgina -->
        <footer style="height: 15px; top: 475px;">
            <h6>Desenvolupat per Osc1977</h6>
        </footer>
    </body>
</html>
