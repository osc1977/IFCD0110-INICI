<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Animations</title>

        <!-- Esto sirve llamar los estilos de un documento css -->
        <link rel="stylesheet" href="./css/est-Animations.css" />

        <!-- Esto sirve para poner un icono en la pestaña de la página -->
        <link rel="icon" href="./img/logo.svg" type="image/x-icon" />
        
    </head>

    <!-- Siempre hay que terminar las etiqeutas con: <xx>...</xx> y si solo llevan una se le pone al final: <xx yyyyy /> -->   

    <body>
        <!-- Esta etiqueta sirve para poner los elementos al comenzar de la pàgina, ... -->
        <header>
            Exercici amb efectes d'animació
        </header>

        <!-- Esta etiqueta sirve para poner los elementos en el contenido, ... -->
        <main>
            <div class="AniColor caixa animacio1">O</div>
            <div class="AniDespl caixa animacio2">S</div>
            <div class="AniVaris caixa animacio3">C</div>
            <div class="AniVaris caixa animacio4">A</div>
            <div class="AniVaris caixa animacio5">R</div>
            <hr>
            <div class="frase">
                <div class="animacioGenerica letra-C">C</div>
                <div class="animacioGenerica letra-U">U</div>
                <div class="animacioGenerica letra-R">R</div>
                <div class="animacioGenerica letra-S">S</div>
                <div class="animacioGenerica">&nbsp</div>
                <div class="animacioGenerica letra-D">D</div>
                <div class="animacioGenerica letra-APOS">'</div>
                <div class="animacioGenerica letra-A">A</div>
                <div class="animacioGenerica letra-N">N</div>
                <div class="animacioGenerica letra-I">I</div>
                <div class="animacioGenerica letra-M">M</div>
                <div class="animacioGenerica letra-A2">A</div>
                <div class="animacioGenerica letra-C2">C</div>
                <div class="animacioGenerica letra-I2">I</div>
                <div class="animacioGenerica letra-O">Ó</div>
            </div>
        </main>
 
        <!-- Esta etiqueta sirve para poner los elementos al final de la pàgina, ... -->
        <footer>
            ©(2026) Desenvolupado por Oscar. Todos los derechos reservados.
        </footer>
    </body>
</html>
