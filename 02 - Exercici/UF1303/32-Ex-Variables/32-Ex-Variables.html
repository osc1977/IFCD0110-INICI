<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Variables</title>

        <!-- Esto sirve llamar los estilos de un documento css, el un icono en la pestaña de la página-->
        <link rel="stylesheet" href="./css/estils-variables.css" />
        <link rel="icon" href="./img/logo.svg" type="image/x-icon" />
        
        <!-- ---------- ICONES ---------- -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

        <style>
            /* Aqui van los estilos, tambien se pueden poner en un documento css, es preferible */
        </style>
    </head>

    <!-- Siempre hay que terminar las etiqeutas con: <xx>...</xx> y si solo llevan una se le pone al final: <xx yyyyy /> -->   

    <body>
        <!-- Esta etiqueta sirve para poner los elementos al comenzar de la pàgina, ... -->
        <header>
            Exercici de variables
        </header>

        <!-- Esta etiqueta sirve para poner los elementos de un posible menu, ... -->
        <div class="contenidor">
            <nav>
                <ul>
                    <li><i class="fa-solid fa-house"></i>&nbsp Home</li>
                    <li><i class="fa-solid fa-book"></i>&nbsp Catàleg</li>
                    <li><i class="fa-solid fa-map-location"></i>&nbsp On estem</li>
                    <li><i class="fa-solid fa-archway"></i>&nbsp Historia</li>
                    <li><i class="fa-solid fa-network-wired"></i>&nbsp Intranet</li>
                </ul>
            </nav>
            
            <!-- Esta etiqueta sirve para poner los elementos en el contenido, ... -->
            <main>
                Contingut Principal <br>
            </main>
            
            <!-- Esta etiqueta sirve para poner los elementos de publicidad, banners, ... -->
            <aside>
                Bunners, anuncis
            </aside>
        </div>
        
        <!-- Esta etiqueta sirve para poner los elementos al final de la pàgina, ... -->
        <footer>
                ©(2026) Desenvolupado por Oscar. Todos los derechos reservados.
        </footer>
    </body>
</html>
