<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Menus-Transicions</title>

        <!-- Esto sirve llamar los estilos de un documento css -->
        <link rel="stylesheet" href="./css/estils-menu-class.css" />

        <!-- Esto sirve para poner un icono en la pestaña de la página -->
        <link rel="icon" href="./img/logo.svg" type="image/x-icon" />

        <style>
            /* Aqui van los estilos, tambien se pueden poner en un documento css, es preferible */
        </style>
    </head>

    <!-- Siempre hay que terminar las etiqeutas con: <xx>...</xx> y si solo llevan una se le pone al final: <xx yyyyy /> -->   

    <body>
        <!-- Esta etiqueta sirve para poner los elementos al comenzar de la pàgina, ... -->
        <header>
            Pràctica de menus desplegables amb transicions
        </header>

        <!-- Esta etiqueta sirve para poner los elementos de un posible menu, ... -->
        <nav class="navegador">
            <div class="listado">
                <article>
                    Marcas
                </article>
                <ul class="submenu">
                    <li class="menu">
                        Toyota
                        <ul class="submenu">
                            <li class="menu">CH-R</li>
                            <li class="menu">Yaris</li>
                            <li class="menu">Corolla</li>
                            <li class="menu">Rav4</li>
                        </ul>
                    </li>
                    <li class="menu">
                        Jaecoo
                    </li>
                    <li class="menu">
                        Seat
                        <ul class="submenu">
                            <li class="menu">Ibiza</li>
                            <li class="menu">Ateca</li>
                            <li class="menu">
                                Leon
                                <ul class="submenu">
                                    <li class="menu">Compacto</li>
                                    <li class="menu">Familiar</li>
                                </ul>
                            </li>
                            <li class="menu">Arona</li>
                        </ul>
                    </li>
                    <li class="menu">
                        Ford Shellby
                    </li>
                </ul>
            </div>
        </nav>
 
        <!-- Esta etiqueta sirve para poner los elementos en el contenido, ... -->
        <main>
            <div>
                <article>
                    <section>                      
                    </section>
                </article>
            </div>
        </main>

        <!-- Esta etiqueta sirve para poner los elementos de publicidad, banners, ... -->
        <aside></aside>
 
        <!-- Esta etiqueta sirve para poner los elementos al final de la pàgina, ... -->
        <footer>
            ©(2026) Desenvolupado por Oscar. Todos los derechos reservados.
        </footer>
    </body>
</html>
