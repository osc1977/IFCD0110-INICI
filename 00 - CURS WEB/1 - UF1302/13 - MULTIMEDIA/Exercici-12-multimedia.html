<!DOCTYPE html>
<html>
    <head>
        <title>Multimedia</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="./img/cine.ico" type="image/x-icon">
        <link rel="stylesheet" href="./css/estil-12.css">
    </head>

    <body>
        <header>Exercici d'incoporació de videos multimedia.</header>
        <main>
            <div class="ord">

                <!-- Colocació de videos -->
                    <div class="ficha">
                        <video controls preload="metadata" poster="./img/El_resplandor.jpg" width="300px" height="170">
                            <source src="./Video/345244_tiny.mp4" type="video/mp4"/>
                            Ho sentim, el teu navegador no suporta la reproducció de vídeo.
                        </video>
                        Jack Torrance es un hombre que se muda con su familia a un hotel aislado que debe cuidar.
                    </div>

                    <div class="ficha">
                        <video controls preload="metadata" poster="./img/El_bosque.jpg" width="300px" height="170">
                            <source src="./Video/346395_tiny.mp4" type="video/mp4"/>
                            Ho sentim, el teu navegador no suporta la reproducció de vídeo.
                        </video>
                        Trata de una aldea en un valle de Filadelfia rodeado de bosques. Los aldeanos son gente simple.
                    </div>
            </div>

           <hr>

            <div div class="ord">        
                <!-- Colocació d'audios -->
                    <div style="display: flex; flex-direction: column; text-align: center;">
                        <audio controls src="./audio/alexzavesa-dance-playful-night-510786.mp3" audio="video/mp3">
                            Ho sentim, el teu navegador no suporta la reproducció d'audio.
                        </audio>
                        El resplandor.
                    </div>

                    <div style="display: flex; flex-direction: column; text-align: center;">
                        <audio controls src="./audio/artmylife-powerful-dramatic-trailer-514242.mp3" audio="video/mp3">
                            Ho sentim, el teu navegador no suporta la reproducció d'audio.
                        </audio>
                        El bosque.
                    </div>
            </div>

            <br>

        </main>

        <footer>
            Desenvolupat per Oscar.
        </footer>
    </body>   
</html>
