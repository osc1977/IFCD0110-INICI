<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Menu / Transicions</title>

        <!-- Esto sirve llamar los estilos de un documento css -->
        <link rel="stylesheet" href="./css/Estil-Menu-Tran2.css" />

        <!-- Esto sirve para poner un icono en la pestaña de la página -->
        <link rel="icon" href="./img/logo.svg" type="image/x-icon" />
    </head>

    <!-- Siempre hay que terminar las etiqeutas con: <xx>...</xx> y si solo llevan una se le pone al final: <xx yyyyy /> -->   

    <body>
        <!-- Esta etiqueta sirve para poner los elementos al comenzar de la pàgina, ... -->
        <header>Pràctica de menus desplegables amb transicions
        </header>

        <!-- Esta etiqueta sirve para poner los elementos de un posible menu, ... -->
        <nav class="navegador">
            <ul class="menu">
                <li class="boton submenu">Toyota</li>
                <li class="boton submenu">Seat</li>
                    <ul class="menu">
                        <li class="boton submenu">SUV</li>
                        <li class="boton submenu">Familiar</li>
                    </ul>            
            </ul>            
        </nav>
 
        <!-- Esta etiqueta sirve para poner los elementos en el contenido, ... -->
        <main>
            Casas
        </main>

        <!-- Esta etiqueta sirve para poner los elementos de publicidad, banners, ... -->
        <aside>
        </aside>
 
        <!-- Esta etiqueta sirve para poner los elementos al final de la pàgina, ... -->
        <footer>
            ©(2026) Desenvolupado por Oscar. Todos los derechos reservados.
        </footer>
    </body>
</html>
